openapi: 3.0.0
info:
  contact: {}
  description: ""
  title: Futr Enterprise API Documentation
  version: "0.1"
servers:
- url: /
paths:
  /documents:
    post:
      operationId: DocumentController_uploadDocument
      parameters:
      - description: "user's email address (for enterprise use only, end-client should\
          \ skip this header)"
        explode: false
        in: header
        name: x-client-email
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentController_uploadDocument_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                example: 783b69a1-0a...
                type: string
          description: "\n        File upload accepted after validation and malware\
            \ scan. Returns a document ID immediately; OCR,\n        storage, and\
            \ downstream processing continue asynchronously. Use the returned ID with\
            \ GET /documents/:id\n        to poll processing status and fetch extracted\
            \ details.\n      "
      security:
      - bearer: []
      summary: Uploading a new document
      tags:
      - Documents
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /enterprise/auth:
    post:
      description: |
        Exchanges your enterprise client credentials for an
        OAuth2 access token. This token is required for accessing protected
        enterprise endpoints including import-clients and document operations.
      operationId: EnterpriseController_auth
      parameters: []
      requestBody:
        content:
          application/json:
            examples:
              basic:
                summary: Basic authentication example
                value:
                  clientId: abc123xyz789
                  clientSecret: secret_key_12345
            schema:
              $ref: "#/components/schemas/AuthDTO"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                example:
                  access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  token_type: Bearer
                  expires_in: 3600
          description: Successfully authenticated. Access token returned with doc/upload
            scope.
        "401":
          description: Invalid client credentials provided.
      summary: Authenticate and retrieve OAuth2 token
      tags:
      - Enterprise
      x-content-type: application/json
      x-accepts:
      - application/json
  /enterprise/import-clients:
    post:
      description: |+
        Imports a list of clients into your organization. Requires a
        valid OAuth2 access token obtained from the /auth endpoint. Each client
        will be added to your organization with the provided email and unique
        external client ID.

        The clientId will serve as an external identifier to track which
        enterprise client each consumer belongs to. Critically, this clientId
        mapping determines document upload behavior: documents uploaded by
        imported clients will be stored unencrypted (enterprise-managed storage).
        Clients will be created in Cognito if they do not already exist, and
        their association with your organization and the provided clientId will
        be stored in the system.

        Import Format:
        A customer-generated CSV file will be used to onboard multiple users in
        bulk. The CSV file will have the following format:

        clientEmail,clientId

        When using the Brands App, the user's email will be used as the
        clientEmail and the initial password will be an OTP sent to the
        user's email. The clientId will be any unique identifier from your
        enterprise system that you want to associate with this client. This will
        allow you to maintain a mapping between your enterprise system and the
        consumers created in this platform, and will enable unencrypted document
        storage for these clients.

      operationId: EnterpriseController_importClients
      parameters: []
      requestBody:
        content:
          application/json:
            examples:
              singleClient:
                summary: Import single client
                value:
                  clients:
                  - clientEmail: client@example.com
                    clientId: client_001
              multipleClients:
                summary: Import multiple clients
                value:
                  clients:
                  - clientEmail: client1@example.com
                    clientId: client_001
                  - clientEmail: client2@example.com
                    clientId: client_002
                  - clientEmail: client3@example.com
                    clientId: client_003
            schema:
              $ref: "#/components/schemas/ImportClientsDTO"
        required: true
      responses:
        "204":
          description: Clients successfully imported. Returns no content.
        "400":
          description: Invalid request body. Ensure clients array has at least 1 item
            and all fields are valid.
        "401":
          description: Unauthorized. Invalid or missing OAuth2 token.
        "403":
          description: Forbidden. Your organization does not have enterprise access.
      security:
      - bearer: []
      summary: Import enterprise clients
      tags:
      - Enterprise
      x-content-type: application/json
      x-accepts:
      - application/json
components:
  schemas:
    AuthDTO:
      example:
        clientId: abc123xyz789
        clientSecret: secret_key_12345
      properties:
        clientId:
          description: The OAuth2 client ID for your application
          example: abc123xyz789
          type: string
        clientSecret:
          description: The OAuth2 client secret for your application
          example: secret_key_12345
          type: string
      required:
      - clientId
      - clientSecret
      type: object
    ImportClientDTO:
      properties:
        clientEmail:
          description: Email address of the client to import
          example: client@example.com
          format: email
          type: string
        clientId:
          description: Unique external identifier for the client. Used to track and
            associate this consumer with your external enterprise system. This ID
            is stored in the system and can be used for reporting and client tracking
            purposes.
          example: client_001
          type: string
      required:
      - clientEmail
      - clientId
      type: object
    ImportClientsDTO:
      example:
        clients:
        - clientEmail: client1@example.com
          clientId: client_001
        - clientEmail: client2@example.com
          clientId: client_002
      properties:
        clients:
          description: Array of clients to import. Each client is identified by their
            email and a unique external ID from your enterprise system. The external
            ID (clientId) is used to maintain a mapping between your enterprise system
            and the consumers created in this platform. Minimum 1 client required.
          example:
          - clientEmail: client1@example.com
            clientId: client_001
          - clientEmail: client2@example.com
            clientId: client_002
          items:
            $ref: "#/components/schemas/ImportClientDTO"
          minItems: 1
          type: array
      required:
      - clients
      type: object
    DocumentController_uploadDocument_request:
      description: "\n        Using multipart/form-data, upload a document file along\
        \ with these fields:\n        - file: The document to upload (PDF, JPEG, PNG,\
        \ DOCX).\n        - monetized: Boolean indicating if the document is monetized\
        \ (contributes to user profile), at the moment always true.\n        - fileHash:\
        \ SHA-256 hash of the file content for integrity verification (hex string).\n\
        \        - derivedKey: (Optional) Derived encryption key for the document,\
        \ encrypted with the user's public key. Required for end-clients with a CMK\
        \ to enable encryption at rest and decryption for agent queries. Enterprises\
        \ should skip this property.\n        - password: (Optional) User's decryption\
        \ password for end-clients. Enterprises should skip this property.\n     \
        \   - isID: (Optional) Boolean indicating if the document is an ID for end-clients.\
        \ Enterprises should skip this property.\n        - taskId: (Optional) String\
        \ task ID for end-clients. Enterprises should skip this property.\n      "
      properties:
        file:
          format: binary
          type: string
        monetized:
          description: Monetized documents will contribute to building the client's
            profile
          type: boolean
        fileHash:
          description: SHA-256 hash of the file content for integrity verification
            (hex string)
          type: string
        derivedKey:
          description: "derived encryption key for the document  \n            Users\
            \ without a CMK or are **Enterprises** can skip this property.\n     \
            \       For end-clients with a CMK, this should be provided to enable\
            \ encryption at rest and decryption for agent queries.\n            For\
            \ enterprise clients, this property should be skipped.\n            "
          type: string
        password:
          description: "user's decryption password (for end-client use only, enterprise\
            \ should skip this property)"
          type: string
        isID:
          description: "(for end-client use only, enterprise should skip this property)"
          type: boolean
        taskId:
          description: "(for end-client use only, enterprise should skip this property)"
          type: string
      required:
      - file
      - fileHash
      - monetized
      type: object
  securitySchemes:
    bearer:
      bearerFormat: JWT
      scheme: bearer
      type: http

